{% extends 'base.html' %}
{% load static %}
{% block content %}

<h1>Product List</h1>

<ul>

{% for product in products %}
    <li>
        <a href="{% url 'merchstore:product-detail' product.pk %}">
            {{ product.name }}
        </a>
    </li>
    {% endfor %}
</ul> 

{% if user.is_authenticated and user.profile.role == "Market Seller" %}
    <a href="{% url 'merchstore:add' %}" class="btn">Create Product</a>
{% endif %}

{% endblock %}
